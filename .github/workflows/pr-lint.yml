name: PR Gates

on:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pr-lint:
    name: PR lint
    runs-on: ubuntu-24.04

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install formatter
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends indent

      - name: Check diff whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --check "$BASE_SHA...HEAD"

      - name: Check changed C formatting
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -d '' changed_files < <(
            git diff --name-only -z --diff-filter=ACMRT \
              "$BASE_SHA...HEAD" -- '*.c'
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed C files."
            exit 0
          fi

          ./tools/gst-indent "${changed_files[@]}"
          git diff --exit-code -- "${changed_files[@]}"

  pr-build:
    name: PR build
    runs-on: ubuntu-24.04
    needs: pr-lint

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            libglib2.0-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip

      - name: Configure
        run: |
          meson setup _build

      - name: Build
        run: |
          meson compile -C _build

      - name: Test
        run: |
          meson test -C _build --print-errorlogs
